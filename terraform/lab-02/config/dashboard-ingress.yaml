apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: kubernetes-dashboard-ingress
  namespace: kubernetes-dashboard
  annotations:
    nginx.ingress.kubernetes.io/backend-protocol: "HTTPS"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/ssl-passthrough: "false"
    # Ponieważ Airflow ma teraz własny certyfikat samopodpisany, pomijamy weryfikację między Ingress a Podem
    nginx.ingress.kubernetes.io/proxy-ssl-verify: "false"
spec:
  ingressClassName: public # Upewnij się, że to właściwa klasa dla Twojego MicroK8s (często 'public' lub 'nginx')
  tls:
    - secretName: airflow-tls-secret
  rules:
    # Brak sekcji 'host' - Ingress przechwyci zapytania bezpośrednio po IP
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                # Wskazujemy na usługę Konga
                name: kubernetes-dashboard-kong-proxy
                port:
                  number: 443